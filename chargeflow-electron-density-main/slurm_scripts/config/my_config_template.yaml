# My Personal SLURM Configuration Template
# Copy this file and customize it for your needs:
#   cp slurm_scripts/config/my_config_template.yaml slurm_scripts/config/my_config.yaml
#   vim slurm_scripts/config/my_config.yaml
# 
# Then use it:
#   python slurm_scripts/submit_job.py --config slurm_scripts/config/my_config.yaml --script training/train_multi_gpu.sh

# ============================================
# USER SETTINGS (Update these!)
# ============================================

notifications:
  email: "your.email@example.com"  # TODO: Change this!
  notify_on_start: false
  notify_on_end: true
  notify_on_fail: true

environment:
  conda_env: "flowmatch"  # TODO: Update if different
  module_loads:
    - "cuda/11.8"  # TODO: Check your cluster's available modules
    - "cudnn/8.6"

# ============================================
# PATHS (Update these!)
# ============================================

paths:
  # Project paths
  project_root: "/path/to/chargeflow-electron-density"
  code_dir: "${project_root}"
  
  # Data paths - TODO: Update with your actual data location!
  data_root: "/path/to/your/data"  # TODO: CHANGE THIS!
  
  # Training data
  train_data_list: "${data_root}/list_d_train"
  train_label_list: "${data_root}/list_l_train"
  train_data_gridsize: "${data_root}/list_dgs_train"
  train_label_gridsize: "${data_root}/list_lgs_train"
  
  # Validation data
  val_data_list: "${data_root}/list_d_val"
  val_label_list: "${data_root}/list_l_val"
  val_data_gridsize: "${data_root}/list_dgs_val"
  val_label_gridsize: "${data_root}/list_lgs_val"
  
  # Output paths
  output_dir: "${code_dir}/output_dir"
  log_dir: "${code_dir}/logs"

# ============================================
# CLUSTER RESOURCES (Check your cluster!)
# ============================================

resources:
  # Single GPU job
  single_gpu:
    partition: "gpu"  # TODO: Check your cluster's partition names
    nodes: 1
    ntasks_per_node: 1
    gpus_per_node: 1
    cpus_per_task: 8
    memory: "32G"
    time: "24:00:00"
  
  # Multi-GPU single node
  multi_gpu:
    partition: "gpu"  # TODO: Check your cluster's partition names
    nodes: 1
    ntasks_per_node: 4  # Match your GPUs per node
    gpus_per_node: 4    # TODO: Adjust based on your hardware
    cpus_per_task: 8
    memory: "128G"
    time: "48:00:00"
  
  # Multi-node training
  multi_node:
    partition: "gpu"  # TODO: Check your cluster's partition names
    nodes: 4
    ntasks_per_node: 4
    gpus_per_node: 4
    cpus_per_task: 8
    memory: "128G"
    time: "72:00:00"

# ============================================
# TRAINING PARAMETERS (Customize as needed)
# ============================================

training:
  # Model architecture
  model: "unet3d"
  in_channels: 1
  out_channels: 1
  base_channels: 32
  
  # Training hyperparameters
  batch_size: 16
  learning_rate: 0.0001
  num_epochs: 100
  
  # Optimization
  optimizer: "adamw"
  weight_decay: 0.01
  grad_clip: 1.0
  
  # Distributed training
  backend: "nccl"
  find_unused_parameters: false

# ============================================
# INFERENCE PARAMETERS
# ============================================

inference:
  batch_size: 8
  num_workers: 4
  output_format: "npy"
  save_metrics: true

# ============================================
# EXAMPLES OF COMMON CONFIGURATIONS
# ============================================

