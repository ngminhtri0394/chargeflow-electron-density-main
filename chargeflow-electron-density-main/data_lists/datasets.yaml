# Dataset Configuration Mapping
# This file provides easy reference for all available datasets

# ==============================================================================
# TRAINING DATASETS
# ==============================================================================

training_datasets:
  # Main charged systems dataset
  charged:
    name: "Charged Electron Density Systems"
    data_list: "data_lists/training/list_d_charged_train"
    label_list: "data_lists/training/list_l_charged_train"
    data_gridsize: "data_lists/training/list_dgs_charged_train"
    label_gridsize: "data_lists/training/list_lgs_charged_train"
    val_data_list: "data_lists/training/list_d_charged_val"
    val_label_list: "data_lists/training/list_l_charged_val"
    val_data_gridsize: "data_lists/training/list_dgs_charged_val"
    val_label_gridsize: "data_lists/training/list_lgs_charged_val"
    test_data_list: "data_lists/training/list_d_charged_test"
    test_label_list: "data_lists/training/list_l_charged_test"
    test_data_gridsize: "data_lists/training/list_dgs_charged_test"
    test_label_gridsize: "data_lists/training/list_lgs_charged_test"
    train_stats: "data_lists/stats/train_stats.json"
  
  # Materials Project subset (12k charged)
  subMP_12k_charged:
    name: "Materials Project 12k Charged"
    data_list: "data_lists/training/list_d_subMP_12k_charged_train"
    label_list: "data_lists/training/list_l_subMP_12k_charged_train"
    data_gridsize: "data_lists/training/list_dgs_subMP_12k_charged_train"
    label_gridsize: "data_lists/training/list_lgs_subMP_12k_charged_train"
    test_data_list: "data_lists/training/list_d_subMP_12k_charged_test"
    test_label_list: "data_lists/training/list_l_subMP_12k_charged_test"
    test_data_gridsize: "data_lists/training/list_dgs_subMP_12k_charged_test"
    test_label_gridsize: "data_lists/training/list_lgs_subMP_12k_charged_test"
    train_stats: "data_lists/stats/train_stats.json"
  
  # SubMP with start charge
  subMP_12k_charged_start_charge:
    name: "Materials Project 12k with Start Charge"
    data_list: "data_lists/training/list_d_subMP_12k_charged_start_charge_train"
    label_list: "data_lists/training/list_l_subMP_12k_charged_start_charge_train"
    data_gridsize: "data_lists/training/list_dgs_subMP_12k_charged_start_charge_train"
    label_gridsize: "data_lists/training/list_lgs_subMP_12k_charged_start_charge_train"
    test_data_list: "data_lists/training/list_d_subMP_12k_charged_start_charge_test"
    test_label_list: "data_lists/training/list_l_subMP_12k_charged_start_charge_test"
    test_data_gridsize: "data_lists/training/list_dgs_subMP_12k_charged_start_charge_test"
    test_label_gridsize: "data_lists/training/list_lgs_subMP_12k_charged_start_charge_test"
    train_stats: "data_lists/stats/train_stats.json"
  
  # Defects charged
  defects_charged:
    name: "Charged Defects"
    data_list: "data_lists/training/list_d_defects_charged"
    label_list: "data_lists/training/list_l_defects_charged"
    data_gridsize: "data_lists/training/list_dgs_defects_charged"
    label_gridsize: "data_lists/training/list_lgs_defects_charged"
    train_stats: "data_lists/stats/train_stats_defects_charged.json"

