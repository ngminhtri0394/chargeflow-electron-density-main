# Inference Configuration: Electrenes
# Standard electrene materials test set

model:
  name: "unet3d"
  in_channels: 1
  out_channels: 1

data:
  test_data_list: "data_lists/test_sets/list_d_electrenes"
  test_label_list: "data_lists/test_sets/list_l_electrenes"
  test_data_gridsize: "data_lists/test_sets/list_dgs_electrenes"
  test_label_gridsize: "data_lists/test_sets/list_lgs_electrenes"
  train_stats: "data_lists/stats/train_stats_electrenes.json"
  batch_size: 1
  num_workers: 4

inference:
  num_steps: 50
  ode_method: "heun2"
  use_ema: true
  save_predictions: true
  calculate_metrics: true

output:
  output_dir: "predictions/electrenes"
  log_file: "predictions/electrenes/inference.log"
