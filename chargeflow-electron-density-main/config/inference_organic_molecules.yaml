# Inference Configuration: Organic Molecules
# Organic molecules test set

model:
  name: "unet3d"
  in_channels: 1
  out_channels: 1

data:
  test_data_list: "data_lists/test_sets/list_d_organic_molecules"
  test_label_list: "data_lists/test_sets/list_l_organic_molecules"
  test_data_gridsize: "data_lists/test_sets/list_dgs_organic_molecules"
  test_label_gridsize: "data_lists/test_sets/list_lgs_organic_molecules"
  train_stats: "data_lists/stats/train_stats_organic_molecules.json"
  batch_size: 1
  num_workers: 4

inference:
  num_steps: 50
  ode_method: "heun2"
  use_ema: true
  save_predictions: true
  calculate_metrics: true

output:
  output_dir: "predictions/organic_molecules"
  log_file: "predictions/organic_molecules/inference.log"
