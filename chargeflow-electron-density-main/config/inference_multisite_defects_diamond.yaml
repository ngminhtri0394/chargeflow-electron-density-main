# Inference Configuration: Multi-site Diamond Defects
# Multi-site defect structures in diamond

model:
  name: "unet3d"
  in_channels: 1
  out_channels: 1

data:
  test_data_list: "data_lists/test_sets/list_d_multisite_defects_diamond"
  test_label_list: "data_lists/test_sets/list_l_multisite_defects_diamond"
  test_data_gridsize: "data_lists/test_sets/list_dgs_multisite_defects_diamond"
  test_label_gridsize: "data_lists/test_sets/list_lgs_multisite_defects_diamond"
  train_stats: "data_lists/stats/train_stats_multisite_defects_diamond.json"
  batch_size: 1
  num_workers: 4

inference:
  num_steps: 50
  ode_method: "heun2"
  use_ema: true
  save_predictions: true
  calculate_metrics: true

output:
  output_dir: "predictions/multisite_defects_diamond"
  log_file: "predictions/multisite_defects_diamond/inference.log"
